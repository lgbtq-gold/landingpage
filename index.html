<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>להט"ב זהב | GOLD - LGBTQ+ Golden Agers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Alef', sans-serif;
            color: #2d2d2d;
            direction: rtl;
        }

        /* ── Rainbow top bar ── */
        .rainbow-bar {
            height: 6px;
            background: linear-gradient(to left, #E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* ── Hero section — full viewport ── */
        .hero {
            min-height: 100vh;
            display: flex;
            position: relative;
        }

        /* ── Left panel — image grid ── */
        .hero-image-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .hero-image-panel .img-cell {
            position: relative;
            overflow: hidden;
        }

        .hero-image-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            inset: 0;
        }

        .hero-image-panel::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to left,
                rgba(255,255,255,0.15) 0%,
                transparent 40%
            );
            z-index: 1;
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 36px;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 2;
            text-align: center;
        }

        .image-overlay h1 {
            font-family: 'Alef', sans-serif;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            line-height: 1.4;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .image-overlay p {
            font-size: 18px;
            color: rgba(255,255,255,0.9);
            margin-top: 6px;
        }

        /* ── Right panel — form ── */
        .hero-form-panel {
            width: 480px;
            min-width: 400px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 44px;
            position: relative;
            overflow-y: auto;
        }

        .form-panel-border {
            position: absolute;
            top: 6px;
            right: 0;
            bottom: 0;
            width: 5px;
            background: linear-gradient(to bottom, #E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787);
        }

        .mobile-header {
            display: none;
        }

        .form-header {
            margin-bottom: 28px;
            text-align: center;
        }

        .form-header h2 {
            font-family: 'Alef', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 18px;
            color: #777;
        }

        /* ── Tally Embed Styling ── */
        .tally-iframe-container {
            width: 100%;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            flex-grow: 1;
        }

        .tally-iframe-container iframe {
            border: none;
            width: 100%;
            background: transparent;
            flex-grow: 1;
        }

        /* ── Social links ── */
        .social-bar {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .social-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.25s ease;
            color: #fff;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
        }

        .social-icon.fb { background: #1877F2; }
        .social-icon.wa { background: #25D366; }
        .social-icon.web { background: #8B5CF6; }
        .social-icon.email { background: #EA4335; }

        .social-label {
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-top: 10px;
        }

        /* ── Footer — below fold ── */
        footer {
            text-align: center;
            padding: 24px 20px;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        footer img {
            width: 80px;
            margin-bottom: 8px;
        }

        footer p {
            font-family: 'Alef', sans-serif;
            font-size: 15px;
            color: #aaa;
        }

        /* ── Mobile ── */
        @media (max-width: 860px) {
            .hero {
                flex-direction: column;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .hero-image-panel {
                height: 28vh;
                height: 28dvh;
                min-height: 160px;
                flex: none;
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: 1fr;
            }

            .image-overlay {
                display: none;
            }

            .mobile-header {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 18px 16px 0;
                gap: 6px;
            }

            .mobile-header img {
                width: 100px;
                height: auto;
            }

            .mobile-header h1 {
                font-family: 'Alef', sans-serif;
                font-size: 22px;
                font-weight: 700;
                color: #1a1a2e;
                text-align: center;
            }

            .mobile-header p {
                font-size: 16px;
                color: #777;
                text-align: center;
            }

            .hero-form-panel {
                width: 100%;
                min-width: unset;
                flex: 1;
                padding: 14px 20px 24px;
                justify-content: flex-start;
            }

            .form-panel-border {
                right: 0;
                left: 0;
                top: 0;
                width: auto;
                height: 4px;
                background: linear-gradient(to left, #E40303, #FF8C00, #FFED00, #008026, #004DFF, #750787);
            }

            .form-header {
                margin-bottom: 14px;
            }

            .form-header h2 {
                font-size: 22px;
            }

            .form-header p {
                font-size: 16px;
            }



            .social-bar {
                margin-top: 18px;
                padding-top: 16px;
                gap: 12px;
            }

            .social-icon {
                width: 44px;
                height: 44px;
            }
        }

        @media (max-width: 400px) {
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
        }

        @media (max-height: 700px) and (max-width: 860px) {
            .hero-image-panel {
                height: 22vh;
                min-height: 120px;
            }

            .mobile-header {
                padding: 12px 16px 0;
            }

            .mobile-header img {
                width: 80px;
            }

            .mobile-header h1 {
                font-size: 20px;
            }

            .hero-form-panel {
                padding: 10px 18px 20px;
            }

            .form-header {
                margin-bottom: 10px;
            }


        }
    </style>
</head>
